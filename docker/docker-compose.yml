version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-reviewagent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  celery-worker:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - ../.env
    environment:
      DATABASE__URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-reviewagent}
      REDIS__URL: redis://redis:6379/0
      CELERY__BROKER_URL: redis://redis:6379/1
      CELERY__RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ..:/app
    depends_on:
      - postgres
      - redis
    command: sh -c "pip install -e . && celery -A reviewagent.tasks.celery_app worker --loglevel=info"

  celery-beat:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - ../.env
    environment:
      DATABASE__URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-reviewagent}
      REDIS__URL: redis://redis:6379/0
      CELERY__BROKER_URL: redis://redis:6379/1
      CELERY__RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ..:/app
    depends_on:
      - redis
      - celery-worker
    command: sh -c "pip install -e . && celery -A reviewagent.tasks.celery_app beat --loglevel=info"

volumes:
  pgdata:
  redisdata:
